name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Strip binary
        run: strip target/release/amux

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/amux dist/
          tar -czf dist/amux-x86_64-linux.tar.gz -C dist amux

      - name: Generate SHA256
        run: sha256sum dist/amux-x86_64-linux.tar.gz > dist/sha256sums.txt

      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract only the section for this version, stopping at the next "## [" header
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              in_section = ($0 ~ "\\[" ver "\\]")
              next
            }
            in_section { print }
          ' CHANGELOG.md > /tmp/release_notes.md
          echo "Extracted release notes:"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: |
            dist/amux-x86_64-linux.tar.gz
            dist/sha256sums.txt
