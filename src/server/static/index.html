<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>amux</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
/* ─── Tokyo Night tokens ─── */
:root {
  --bg: #1a1b26;
  --surface: #1f2335;
  --surface-2: #24283b;
  --fg: #c0caf5;
  --fg-dim: #565f89;
  --border: #3b4261;
  --accent: #7aa2f7;
  --accent-hover: #89b4fa;
  --success: #9ece6a;
  --warn: #e0af68;
  --danger: #f7768e;
  --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ─── Pages ─── */
.page { display: none; height: 100%; flex-direction: column; }
.page.active { display: flex; }

/* ═══════════════════════════════════════
   PAGE 1: LOGIN
   ═══════════════════════════════════════ */
#login {
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.login-logo {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.03em;
}

.login-card label {
  align-self: stretch;
  font-size: 12px;
  color: var(--fg-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.login-card input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 16px;
  color: var(--fg);
  font-family: var(--font-mono);
  outline: none;
  transition: border-color 150ms;
}

.login-card input:focus {
  border-color: var(--accent);
}

.login-card input::placeholder {
  color: var(--fg-dim);
}

.btn-primary {
  width: 100%;
  padding: 10px 16px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-mono);
  cursor: pointer;
  transition: background 150ms;
}

.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.login-hint {
  font-size: 11px;
  color: var(--fg-dim);
  font-family: var(--font-mono);
  text-align: center;
  line-height: 1.5;
}

#login-error {
  color: var(--danger);
  font-size: 13px;
  font-family: var(--font-mono);
  text-align: center;
  display: none;
}

/* ═══════════════════════════════════════
   PAGE 2: MAIN
   ═══════════════════════════════════════ */
#main { height: 100%; }

/* ─── Top bar ─── */
.topbar {
  height: 44px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding-top: var(--safe-top);
}

.topbar-logo {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.03em;
}

.topbar-title {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  margin: 0 12px;
  text-align: center;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.disconnected { background: var(--danger); }

/* ─── Session list ─── */
.session-list-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  transition: height 200ms ease;
  height: 30vh;
  overflow: hidden;
}
.session-list-wrap.expanded { height: 60vh; }

.session-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  flex-shrink: 0;
}

.session-list-header span {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.btn-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-size: 18px;
  cursor: pointer;
  font-family: var(--font-mono);
  transition: background 100ms;
}
.btn-icon:hover { background: var(--surface-2); }
.btn-icon:active { opacity: 0.7; }

.session-list {
  overflow-y: auto;
  flex: 1;
  overscroll-behavior: contain;
}

.session-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 100ms;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

.session-item:hover { background: var(--surface-2); }
.session-item.active {
  background: var(--surface-2);
  border-left-color: var(--accent);
}

.session-item .agent-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.agent-tag.claude { background: rgba(229,149,110,0.2); color: #e5956e; }
.agent-tag.codex { background: rgba(122,162,247,0.2); color: #7aa2f7; }
.agent-tag.omp   { background: rgba(158,206,106,0.2); color: #9ece6a; }

.session-item .session-title {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-item .session-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-dim);
  white-space: nowrap;
  flex-shrink: 0;
}

.session-item .session-state {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.session-state.running   { background: var(--success); }
.session-state.completed { background: var(--fg-dim); }
.session-state.idle      { background: var(--warn); }

/* swipe delete hint */
.session-item .delete-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--danger);
  font-family: var(--font-mono);
  opacity: 0;
  pointer-events: none;
  transition: opacity 100ms;
}
.session-item.swiped .delete-btn { opacity: 1; pointer-events: auto; }

/* ─── Terminal ─── */
.terminal-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0d0f18;
  min-height: 0;
}

.terminal-wrap .xterm {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
}

.terminal-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg-dim);
  pointer-events: none;
}

/* ─── Virtual function keys ─── */
.fn-bar {
  height: 36px;
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 4px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.fn-btn {
  padding: 4px 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--fg);
  font-family: var(--font-mono);
  font-size: 11px;
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 100ms, color 100ms;
}
.fn-btn:active { background: var(--accent); color: var(--bg); }

/* ─── Input bar ─── */
.input-bar {
  height: 40px;
  display: flex;
  gap: 6px;
  padding: 0 8px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  align-items: center;
  padding-bottom: var(--safe-bottom);
}

.input-bar input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 16px;
  color: var(--fg);
  font-family: var(--font-mono);
  outline: none;
  transition: border-color 150ms;
}

.input-bar input:focus { border-color: var(--accent); }
.input-bar input::placeholder { color: var(--fg-dim); }

.btn-send {
  width: 36px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: var(--bg);
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  transition: background 100ms;
}
.btn-send:hover { background: var(--accent-hover); }
.btn-send:active { opacity: 0.85; }

/* ═══════════════════════════════════════
   PAGE 3: NEW SESSION MODAL
   ═══════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }

.modal-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--fg-dim);
  font-size: 20px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: background 100ms;
}
.modal-close:hover { background: var(--surface-2); }

.modal-card h2 {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--fg);
}

.modal-card label {
  font-size: 11px;
  color: var(--fg-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Agent selector */
.agent-selector {
  display: flex;
  gap: 6px;
}

.agent-option {
  flex: 1;
  padding: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  transition: border-color 100ms, background 100ms;
  color: var(--fg-dim);
}
.agent-option:active { opacity: 0.8; }
.agent-option.selected {
  border-color: var(--accent);
  background: rgba(122,162,247,0.1);
  color: var(--accent);
}

.modal-card textarea {
  width: 100%;
  min-height: 100px;
  resize: vertical;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  color: var(--fg);
  font-family: var(--font-mono);
  outline: none;
  transition: border-color 150ms;
}
.modal-card textarea:focus { border-color: var(--accent); }
.modal-card textarea::placeholder { color: var(--fg-dim); }

#modal-error {
  color: var(--danger);
  font-size: 13px;
  font-family: var(--font-mono);
  text-align: center;
  display: none;
}

/* ─── Context menu (long-press) ─── */
.ctx-menu {
  display: none;
  position: fixed;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 0;
  min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.ctx-menu.open { display: block; }

.ctx-menu-item {
  padding: 8px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg);
  cursor: pointer;
  transition: background 80ms;
}
.ctx-menu-item:hover { background: var(--surface-2); }
.ctx-menu-item.danger { color: var(--danger); }

/* ═══════════════════════════════════════
   LANDSCAPE: sidebar icon bar
   ═══════════════════════════════════════ */
@media (orientation: landscape) and (max-height: 500px) {
  .session-list-wrap { display: none; }
  .topbar { display: none; }

  #main {
    flex-direction: row;
  }

  .sidebar-bar {
    display: flex;
    width: 48px;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding-top: 8px;
    gap: 4px;
    flex-shrink: 0;
    overflow-y: auto;
    align-items: center;
  }

  .sidebar-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    background: transparent;
    border: none;
    color: var(--fg-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 100ms, color 100ms;
    position: relative;
  }
  .sidebar-btn:hover { background: var(--surface-2); }
  .sidebar-btn.active { color: var(--accent); background: rgba(122,162,247,0.1); }

  .sidebar-btn .s-dot {
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .main-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .sidebar-add-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--fg-dim);
    font-size: 18px;
    cursor: pointer;
    font-family: var(--font-mono);
    margin-top: 4px;
    transition: background 100ms, color 100ms;
  }
  .sidebar-add-btn:hover { border-color: var(--accent); color: var(--accent); }
}

@media (orientation: portrait), (min-height: 501px) {
  .sidebar-bar, .main-col { display: none !important; }
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ─── Keyboard avoidance ─── */
body.keyboard-visible .fn-bar { display: none; }
body.keyboard-visible .input-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); padding: 0 8px; border-top: 1px solid var(--border); z-index: 50; padding-bottom: var(--safe-bottom); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     PAGE 1: LOGIN
     ═══════════════════════════════════════ -->
<div id="login" class="page active">
  <div class="login-card">
    <div class="login-logo">amux</div>
    <label for="token-input">Token</label>
    <input id="token-input" type="password" placeholder="paste your token..." autocomplete="off">
    <button class="btn-primary" id="btn-connect">Connect</button>
    <div id="login-error">Invalid token</div>
    <div class="login-hint">Token is set in config.json → serve_token</div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     PAGE 2: MAIN
     ═══════════════════════════════════════ -->
<div id="main" class="page">
  <!-- Top bar (portrait) -->
  <div class="topbar">
    <span class="topbar-logo">amux</span>
    <span class="topbar-title" id="current-title">Select a session</span>
    <span class="status-dot disconnected" id="ws-status"></span>
  </div>

  <!-- Session list (portrait, collapsible) -->
  <div class="session-list-wrap" id="session-list-wrap">
    <div class="session-list-header">
      <span>Sessions</span>
      <button class="btn-icon" id="btn-new-session">+</button>
    </div>
    <div class="session-list" id="session-list"></div>
  </div>

  <!-- Landscape: sidebar icon bar -->
  <div class="sidebar-bar" id="sidebar-bar"></div>

  <!-- Terminal + input column (landscape) -->
  <div class="main-col">
    <div class="terminal-wrap" id="terminal-wrap">
      <div class="terminal-placeholder" id="terminal-placeholder">no session connected</div>
    </div>
    <div class="fn-bar" id="fn-bar">
      <button class="fn-btn" data-key="Escape">ESC</button>
      <button class="fn-btn" data-key="Tab">TAB</button>
      <button class="fn-btn" data-key="ArrowUp">↑</button>
      <button class="fn-btn" data-key="ArrowDown">↓</button>
      <button class="fn-btn" data-key="Control+c">Ctrl+C</button>
      <button class="fn-btn" data-key="Control+d">Ctrl+D</button>
    </div>
    <div class="input-bar">
      <input id="cmd-input" type="text" placeholder="send input..." autocomplete="off" spellcheck="false">
      <button class="btn-send" id="btn-send">→</button>
    </div>
  </div>

  <!-- Terminal area (portrait — shown when not in landscape sidebar mode) -->
  <div class="terminal-wrap" id="terminal-wrap-portrait">
    <div class="terminal-placeholder" id="terminal-placeholder-portrait">no session connected</div>
  </div>
  <div class="fn-bar" id="fn-bar-portrait">
    <button class="fn-btn" data-key="Escape">ESC</button>
    <button class="fn-btn" data-key="Tab">TAB</button>
    <button class="fn-btn" data-key="ArrowUp">↑</button>
    <button class="fn-btn" data-key="ArrowDown">↓</button>
    <button class="fn-btn" data-key="Control+c">Ctrl+C</button>
    <button class="fn-btn" data-key="Control+d">Ctrl+D</button>
  </div>
  <div class="input-bar" id="input-bar-portrait">
    <input id="cmd-input-portrait" type="text" placeholder="send input..." autocomplete="off" spellcheck="false">
    <button class="btn-send" id="btn-send-portrait">→</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     PAGE 3: NEW SESSION MODAL
     ═══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-new-session">
  <div class="modal-card">
    <button class="modal-close" id="modal-close">×</button>
    <h2>New Session</h2>
    <label>Agent</label>
    <div class="agent-selector" id="agent-selector">
      <div class="agent-option" data-agent="claude">Claude</div>
      <div class="agent-option" data-agent="codex">Codex</div>
      <div class="agent-option" data-agent="omp">OMP</div>
    </div>
    <label>Prompt</label>
    <textarea id="session-prompt" placeholder="Describe what this session should do..."></textarea>
    <button class="btn-primary" id="btn-start-session" disabled>Start</button>
    <div id="modal-error"></div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-menu-item danger" data-action="delete">Disconnect</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script>
(function () {
  'use strict';

  // ── Auth ──
  const TOKEN_KEY = 'amux_token';
  let authToken = localStorage.getItem(TOKEN_KEY) || '';

  function authHeaders() {
    return authToken ? { 'Authorization': 'Bearer ' + authToken } : {};
  }
  function wsTokenParam() {
    return authToken ? '?token=' + encodeURIComponent(authToken) : '';
  }

  // ── State ──
  let ws = null;
  let currentSession = null;
  let activePtyIds = new Set();
  let sessions = [];
  let selectedAgent = null;
  let terminal = null;
  let fitAddon = null;
  let terminalFontSize = 14;
  let refreshTimer = null;

  /* ─── DOM refs ─── */
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  const loginPage       = $('#login');
  const mainPage        = $('#main');
  const tokenInput      = $('#token-input');
  const btnConnect      = $('#btn-connect');
  const loginError      = $('#login-error');
  const sessionListEl   = $('#session-list');
  const sessionListWrap = $('#session-list-wrap');
  const currentTitle    = $('#current-title');
  const wsStatus        = $('#ws-status');
  const termWrapLandscape = $('#terminal-wrap');
  const termPlaceholder = $('#terminal-placeholder');
  const fnBarLandscape  = $('#fn-bar');
  const termWrapPortrait = $('#terminal-wrap-portrait');
  const termPlaceholderPortrait = $('#terminal-placeholder-portrait');
  const fnBarPortrait   = $('#fn-bar-portrait');
  const cmdInput        = $('#cmd-input');
  const btnSend         = $('#btn-send');
  const cmdInputPortrait = $('#cmd-input-portrait');
  const btnSendPortrait = $('#btn-send-portrait');
  const inputBarPortrait = $('#input-bar-portrait');
  const btnNewSession   = $('#btn-new-session');
  const modal           = $('#modal-new-session');
  const modalClose      = $('#modal-close');
  const agentSelector   = $('#agent-selector');
  const sessionPrompt   = $('#session-prompt');
  const btnStart        = $('#btn-start-session');
  const modalError      = $('#modal-error');
  const ctxMenu         = $('#ctx-menu');
  const sidebarBar      = $('#sidebar-bar');

  /* ─── Utility ─── */
  function escHtml(s) {
    const d = document.createElement('span');
    d.textContent = s;
    return d.innerHTML;
  }

  function isLandscape() {
    return window.matchMedia('(orientation: landscape) and (max-height: 500px)').matches;
  }

  /* ─── Determine which terminal container is visible ─── */
  function getActiveTerminalWrap() {
    return isLandscape() ? termWrapLandscape : termWrapPortrait;
  }

  function getActiveFnBar() {
    return isLandscape() ? fnBarLandscape : fnBarPortrait;
  }

  /* ─── API fetch with auth ─── */
  async function apiFetch(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers || {}, authHeaders());
    const res = await fetch(url, opts);
    if (res.status === 401) {
      showLogin();
      throw new Error('unauthorized');
    }
    return res;
  }

  /* ─── Login ─── */
  async function attemptLogin() {
    const token = tokenInput.value.trim();
    if (!token) return;
    loginError.style.display = 'none';
    try {
      const res = await fetch('/api/sessions', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) {
        loginError.style.display = 'block';
        return;
      }
      authToken = token;
      localStorage.setItem(TOKEN_KEY, token);
      goToMain();
    } catch (e) {
      loginError.style.display = 'block';
    }
  }

  btnConnect.addEventListener('click', attemptLogin);
  tokenInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') attemptLogin();
  });

  function showLogin() {
    loginPage.classList.add('active');
    mainPage.classList.remove('active');
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  }

  function goToMain() {
    loginPage.classList.remove('active');
    mainPage.classList.add('active');
    initTerminal();
    loadSessions();
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(loadSessions, 10000);
  }

  /* ─── Sessions ─── */
  async function loadSessions() {
    let sessionsData, ptysData;
    try {
      const [sessionsRes, ptysRes] = await Promise.all([
        apiFetch('/api/sessions'),
        apiFetch('/api/ptys'),
      ]);
      if (!sessionsRes.ok || !ptysRes.ok) return;
      sessionsData = await sessionsRes.json();
      ptysData = await ptysRes.json();
    } catch (e) {
      return;
    }

    const ptys = (ptysData.ptys || []).filter(p => p.alive);
    activePtyIds = new Set(ptys.map(p => p.id));

    // Build merged session list
    sessions = [];

    // PTY sessions first (running)
    ptys.forEach(p => {
      sessions.push({
        id: p.id,
        agent: p.agent || 'unknown',
        title: p.title || p.id.slice(0, 8),
        state: 'running',
        last_active: Date.now() / 1000,
        isPty: true,
      });
    });

    // Disk sessions
    (sessionsData.sessions || []).forEach(s => {
      if (activePtyIds.has(s.id)) {
        // Already shown as running PTY, update title/agent if available
        const existing = sessions.find(x => x.id === s.id);
        if (existing) {
          existing.title = s.title || existing.title;
          existing.agent = s.agent || existing.agent;
        }
        return;
      }
      let state;
      if (s.active) {
        state = 'idle';
      } else {
        state = 'completed';
      }
      sessions.push({
        id: s.id,
        agent: s.agent || 'unknown',
        title: s.title || s.id.slice(0, 8),
        state: state,
        last_active: s.last_active || 0,
        isPty: false,
      });
    });

    renderSessionList();
    renderSidebar();
  }

  /* ─── Session list (portrait) ─── */
  function renderSessionList() {
    sessionListEl.innerHTML = '';
    sessions.forEach((s) => {
      const el = document.createElement('div');
      el.className = 'session-item' + (s.id === currentSession ? ' active' : '');
      el.dataset.id = s.id;

      const ago = Math.round((Date.now() / 1000 - s.last_active) / 60);
      const timeStr = s.state === 'running' ? 'active' : (ago < 60 ? ago + 'm' : Math.round(ago / 60) + 'h');

      el.innerHTML =
        '<span class="agent-tag ' + escHtml(s.agent) + '">' + escHtml(s.agent.toUpperCase()) + '</span>' +
        '<span class="session-title">' + escHtml(s.title) + '</span>' +
        '<span class="session-time">' + escHtml(timeStr) + '</span>' +
        '<span class="session-state ' + s.state + '"></span>' +
        '<span class="delete-btn">DEL</span>';

      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) return;
        selectSession(s.id);
      });

      /* swipe left to reveal delete */
      let startX = 0;
      el.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
      el.addEventListener('touchmove', (e) => {
        const dx = e.touches[0].clientX - startX;
        el.classList.toggle('swiped', dx < -40);
      });
      el.addEventListener('touchend', () => {
        setTimeout(() => el.classList.remove('swiped'), 1500);
      });

      /* long press context menu */
      let pressTimer = null;
      el.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => showCtxMenu(e.touches[0].clientX, e.touches[0].clientY, s.id), 600);
      });
      el.addEventListener('touchend', () => clearTimeout(pressTimer));
      el.addEventListener('touchmove', () => clearTimeout(pressTimer));

      /* delete button — just disconnect and remove from display */
      el.querySelector('.delete-btn').addEventListener('click', () => {
        if (currentSession === s.id) {
          if (ws) ws.close();
          currentSession = null;
          destroyTerminal();
        }
        const idx = sessions.findIndex((x) => x.id === s.id);
        if (idx !== -1) sessions.splice(idx, 1);
        renderSessionList();
        renderSidebar();
      });

      sessionListEl.appendChild(el);
    });
  }

  function selectSession(id) {
    currentSession = id;
    const s = sessions.find((x) => x.id === id);
    if (s) {
      currentTitle.textContent = s.title;
    }
    renderSessionList();
    renderSidebar();
    connectSession(id);
    sessionListWrap.classList.remove('expanded');
  }

  /* ─── Sidebar (landscape) ─── */
  function renderSidebar() {
    sidebarBar.innerHTML = '';
    sessions.forEach((s) => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-btn' + (s.id === currentSession ? ' active' : '');
      btn.textContent = s.agent.charAt(0).toUpperCase();
      btn.title = s.title;
      btn.innerHTML += '<span class="s-dot session-state ' + s.state + '"></span>';
      btn.addEventListener('click', () => selectSession(s.id));
      sidebarBar.appendChild(btn);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'sidebar-add-btn';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', openNewSession);
    sidebarBar.appendChild(addBtn);
  }

  /* ─── Terminal ─── */
  function initTerminal() {
    // We create the terminal once; move it to the correct container on init
    if (!terminal) {
      terminal = new Terminal({
        fontSize: terminalFontSize,
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
        theme: {
          background: '#0d0f18',
          foreground: '#c0caf5',
          cursor: '#7aa2f7',
          selectionBackground: 'rgba(122,162,247,0.3)',
          black: '#15161e',
          red: '#f7768e',
          green: '#9ece6a',
          yellow: '#e0af68',
          blue: '#7aa2f7',
          magenta: '#bb9af7',
          cyan: '#7dcfff',
          white: '#a9b1d6',
        },
        cursorBlink: true,
        cursorStyle: 'block',
        convertEol: true,
      });
      fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);
    }

    // Open in the active container
    const wrap = getActiveTerminalWrap();
    const placeholder = isLandscape() ? termPlaceholder : termPlaceholderPortrait;
    placeholder.style.display = 'flex';
    try { terminal.open(wrap); } catch(_) {}
    placeholder.style.display = 'none';
    try { fitAddon.fit(); } catch(_) {}

    terminal.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
    });

    const resizeObs = new ResizeObserver(() => {
      try { fitAddon.fit(); } catch (_) {}
    });
    resizeObs.observe(wrap);
  }

  function destroyTerminal() {
    wsStatus.className = 'status-dot disconnected';
    currentTitle.textContent = 'Select a session';
    const p1 = termPlaceholder;
    const p2 = termPlaceholderPortrait;
    if (p1) p1.style.display = 'flex';
    if (p2) p2.style.display = 'flex';
  }

  /* ─── Connect ─── */
  function connectSession(sessionId) {
    if (ws) ws.close();
    currentSession = sessionId;
    const s = sessions.find(x => x.id === sessionId);
    if (s) currentTitle.textContent = s.title;

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/pty/' + sessionId + wsTokenParam());
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      wsStatus.className = 'status-dot connected';
      const p1 = termPlaceholder;
      const p2 = termPlaceholderPortrait;
      if (p1) p1.style.display = 'none';
      if (p2) p2.style.display = 'none';

      // Ensure terminal is in the right container
      const wrap = getActiveTerminalWrap();
      if (terminal && terminal.element && terminal.element.parentElement !== wrap) {
        try { terminal.open(wrap); } catch(_) {}
      }
      try { fitAddon.fit(); } catch(_) {}
      loadSessions();
    };

    ws.onmessage = (e) => {
      if (!terminal) return;
      if (typeof e.data === 'string') {
        terminal.write(e.data);
      } else {
        terminal.write(new Uint8Array(e.data));
      }
    };

    ws.onclose = () => {
      wsStatus.className = 'status-dot disconnected';
      currentSession = null;
      loadSessions();
    };

    ws.onerror = () => {
      wsStatus.className = 'status-dot disconnected';
    };
  }

  /* ─── Send input ─── */
  function sendInput(inputEl) {
    const val = inputEl.value;
    if (val && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(val + '\n');
      inputEl.value = '';
    }
  }

  btnSend.addEventListener('click', () => sendInput(cmdInput));
  cmdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { sendInput(cmdInput); e.preventDefault(); }
  });

  btnSendPortrait.addEventListener('click', () => sendInput(cmdInputPortrait));
  cmdInputPortrait.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { sendInput(cmdInputPortrait); e.preventDefault(); }
  });

  /* ─── Function keys ─── */
  function setupFnBar(bar) {
    bar.addEventListener('click', (e) => {
      const btn = e.target.closest('.fn-btn');
      if (!btn || !ws || ws.readyState !== WebSocket.OPEN) return;
      const key = btn.dataset.key;
      let seq = '';
      if (key === 'Control+c') seq = '\x03';
      else if (key === 'Control+d') seq = '\x04';
      else if (key === 'Escape') seq = '\x1b';
      else if (key === 'Tab') seq = '\t';
      else if (key === 'ArrowUp') seq = '\x1b[A';
      else if (key === 'ArrowDown') seq = '\x1b[B';
      else return;
      ws.send(seq);
    });
  }
  setupFnBar(fnBarLandscape);
  setupFnBar(fnBarPortrait);

  /* ─── Session list collapse/expand (pull down) ─── */
  let listTouchStartY = 0;
  sessionListWrap.addEventListener('touchstart', (e) => {
    listTouchStartY = e.touches[0].clientY;
  });
  sessionListWrap.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - listTouchStartY;
    if (dy > 30) sessionListWrap.classList.add('expanded');
  });

  /* ─── New session modal ─── */
  btnNewSession.addEventListener('click', openNewSession);

  function openNewSession() {
    modal.classList.add('open');
    modalError.style.display = 'none';
    selectedAgent = null;
    btnStart.disabled = true;
    $$('.agent-option').forEach((o) => o.classList.remove('selected'));
    sessionPrompt.value = '';
  }

  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

  function closeModal() {
    modal.classList.remove('open');
  }

  agentSelector.addEventListener('click', (e) => {
    const opt = e.target.closest('.agent-option');
    if (!opt) return;
    $$('.agent-option').forEach((o) => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedAgent = opt.dataset.agent;
    btnStart.disabled = false;
  });

  btnStart.addEventListener('click', async () => {
    if (!selectedAgent) return;
    btnStart.disabled = true;
    modalError.style.display = 'none';
    const prompt = sessionPrompt.value.trim() || 'New session';
    const body = { agent: selectedAgent, prompt: prompt };

    try {
      const res = await apiFetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) {
        modalError.textContent = data.error;
        modalError.style.display = 'block';
        btnStart.disabled = false;
        return;
      }
      closeModal();
      await loadSessions();
      // Auto-connect to the new session
      if (data.id) {
        selectSession(data.id);
      } else {
        // Fallback: find first running PTY
        const running = sessions.find(s => s.state === 'running');
        if (running) selectSession(running.id);
      }
    } catch (e) {
      modalError.textContent = 'Failed to create session';
      modalError.style.display = 'block';
      btnStart.disabled = false;
    }
  });

  /* ─── Context menu ─── */
  let ctxSessionId = null;

  function showCtxMenu(x, y, sessionId) {
    ctxSessionId = sessionId;
    ctxMenu.style.left = Math.min(x, window.innerWidth - 170) + 'px';
    ctxMenu.style.top = y + 'px';
    ctxMenu.classList.add('open');
  }

  document.addEventListener('click', (e) => {
    if (!ctxMenu.contains(e.target)) ctxMenu.classList.remove('open');
  });

  ctxMenu.addEventListener('click', (e) => {
    const item = e.target.closest('.ctx-menu-item');
    if (!item) return;
    const action = item.dataset.action;
    if (action === 'delete') {
      if (currentSession === ctxSessionId) {
        if (ws) ws.close();
        currentSession = null;
        destroyTerminal();
      }
      const idx = sessions.findIndex((s) => s.id === ctxSessionId);
      if (idx !== -1) sessions.splice(idx, 1);
      renderSessionList();
      renderSidebar();
    }
    ctxMenu.classList.remove('open');
  });

  /* ─── Touch swipe between sessions ─── */
  let swipeStartX = 0;
  let swiping = false;

  mainPage.addEventListener('touchstart', (e) => {
    const tw = isLandscape() ? termWrapLandscape : termWrapPortrait;
    if (!e.target.closest('.terminal-wrap') && !e.target.closest('.main-col')) return;
    swipeStartX = e.touches[0].clientX;
    swiping = true;
  });

  mainPage.addEventListener('touchend', (e) => {
    if (!swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - swipeStartX;
    if (Math.abs(dx) < 60) return;
    const idx = sessions.findIndex((s) => s.id === currentSession);
    if (idx === -1) return;
    let next;
    if (dx > 0) {
      next = idx > 0 ? sessions[idx - 1].id : null;
    } else {
      next = idx < sessions.length - 1 ? sessions[idx + 1].id : null;
    }
    if (next) selectSession(next);
  });

  /* ─── Pinch zoom terminal font size ─── */
  let pinchDist0 = 0;
  function handlePinchStart(e) {
    if (e.touches.length === 2) {
      pinchDist0 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }
  function handlePinchMove(e) {
    if (e.touches.length !== 2 || !terminal) return;
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (pinchDist0 === 0) return;
    const scale = dist / pinchDist0;
    terminalFontSize = Math.round(Math.max(8, Math.min(24, terminalFontSize * scale)));
    terminal.options.fontSize = terminalFontSize;
    try { fitAddon.fit(); } catch (_) {}
    pinchDist0 = dist;
  }
  termWrapLandscape.addEventListener('touchstart', handlePinchStart);
  termWrapLandscape.addEventListener('touchmove', handlePinchMove);
  termWrapPortrait.addEventListener('touchstart', handlePinchStart);
  termWrapPortrait.addEventListener('touchmove', handlePinchMove);

  /* ─── Keyboard avoidance ─── */
  if (window.visualViewport) {
    let pendingFit = null;
    window.visualViewport.addEventListener('resize', () => {
      const vv = window.visualViewport;
      const keyboardOpen = (window.innerHeight - vv.height) > 100;
      document.body.classList.toggle('keyboard-visible', keyboardOpen);
      if (pendingFit) clearTimeout(pendingFit);
      pendingFit = setTimeout(() => {
        if (fitAddon) try { fitAddon.fit(); } catch(_) {}
        pendingFit = null;
      }, 80);
    });
  }

  /* ─── Init ─── */
  async function init() {
    try {
      const res = await fetch('/api/sessions', { headers: authHeaders() });
      if (res.status === 401) {
        // Check if we have a stored token
        if (authToken) {
          // Stored token is invalid
          authToken = '';
          localStorage.removeItem(TOKEN_KEY);
        }
        showLogin();
        return;
      }
    } catch (e) {
      // Network error — still try to proceed
    }
    goToMain();
  }

  // Start: try with stored token or unauthenticated
  init();
})();
</script>
</body>
</html>
